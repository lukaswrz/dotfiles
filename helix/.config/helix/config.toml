theme = "github_dark"

[editor]
line-number = "relative"
scroll-lines = 3

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.lsp]
display-messages = true

[editor.whitespace.characters]
space = " "
newline = "⏎"
tab = "→"
tabpad = "·"
nbsp = "⍽"

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
