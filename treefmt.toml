[formatter.nix]
command = "nixfmt"
options = ["--"]
includes = ["*.nix"]

[formatter.toml]
command = "taplo"
options = ["format", "--"]
includes = ["*.toml"]

[formatter.markdown]
command = "prettier"
options = ["--parser", "markdown", "--write", "--"]
includes = ["*.md"]

[formatter.fish]
command = "fish_indent"
options = ["--write", "--"]
includes = ["*.fish"]

[formatter.ruff-format]
command = "ruff"
options = ["format", "--"]
includes = ["*.py"]
