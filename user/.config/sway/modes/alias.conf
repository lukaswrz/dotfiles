mode "grave" {
  bindsym a exec wtype à; mode "default"
  bindsym e exec wtype è; mode "default"
  bindsym i exec wtype ì; mode "default"
  bindsym o exec wtype ò; mode "default"
  bindsym u exec wtype ù; mode "default"
  bindsym Shift+a exec wtype À; mode "default"
  bindsym Shift+e exec wtype È; mode "default"
  bindsym Shift+i exec wtype Ì; mode "default"
  bindsym Shift+o exec wtype Ò; mode "default"
  bindsym Shift+u exec wtype Ù; mode "default"

  bindsym Return mode "default"
  bindsym Escape mode "default"
}

