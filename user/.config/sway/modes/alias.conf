mode "aliases" {
  bindsym g mode "grave"
  bindsym u mode "umlaut"
  bindsym m mode "macrons"
  bindsym a mode "acute"
  bindsym d mode "under_dot"
  bindsym t mode "tilde"
  bindsym c mode "caron"
  bindsym f mode "circumflex"
  bindsym e mode "cedilla"
  bindsym s mode "eszett"

  bindsym Return mode "default"
  bindsym Escape mode "default"
}
