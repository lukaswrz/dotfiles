[icons]
icons = "material-nf"

[theme.overrides]
idle_bg = "#0e0e0ef0"
idle_fg = "#c5c8c6"
info_bg = "#3971ED"
info_fg = "#0e0e0ef0"
good_bg = "#198844"
good_fg = "#0e0e0ef0"
warning_bg = "#FBA922"
warning_fg = "#0e0e0ef0"
critical_bg = "#CC342B"
critical_fg = "#0e0e0ef0"
separator = ""
separator_bg = "auto"
separator_fg = "auto"

[[block]]
block = "focused_window"
format = " $title $marks $visible_marks "

[[block]]
block = "net"
format = " $icon ^icon_net_up $speed_up ^icon_net_down $speed_down "
interval = 1

[[block]]
block = "memory"
format = " $icon $mem_used "
interval = 5

[[block]]
block = "cpu"
format = " $icon $barchart "
interval = 5

[[block]]
block = "disk_space"
path = "/"
info_type = "available"
alert_unit = "GB"
alert = 10
warning = 15
format = " $icon $used/$total "

[[block]]
block = "battery"
interval = 10
format = " $icon $percentage "
missing_format = ""
device = "BAT0"

[[block]]
block = "battery"
interval = 10
format = " $icon $percentage {$time |} "
missing_format = ""
device = "BAT1"

[[block]]
block = "sound"
format = " $icon $volume "
device_kind = "sink"

[[block]]
block = "sound"
format = " $icon $volume "
device_kind = "source"

[[block]]
block = "music"
format = "{ $icon $combo $prev $play $next |}"

[[block]]
block = "time"
interval = 1
format = " $icon $timestamp.datetime(f:'%H:%M:%S, %b %d.') "
